[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules", "../../node_modules"]
test = "test"
script = "scripts"
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
  "@openzeppelin/contracts/=../../node_modules/@openzeppelin/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256
